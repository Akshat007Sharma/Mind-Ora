<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Mind-Ora</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Fraunces:ital,wght@0,300;0,500;1,300&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{min-height:100vh;background:linear-gradient(135deg,#0d1117 0%,#0f1923 50%,#0d1117 100%);display:flex;flex-direction:column;align-items:center;font-family:'DM Sans',sans-serif;padding:0;position:relative;overflow:hidden;}
.blob1{position:fixed;top:-20%;left:-10%;width:500px;height:500px;background:radial-gradient(circle,rgba(56,189,248,0.06) 0%,transparent 70%);border-radius:50%;pointer-events:none;}
.blob2{position:fixed;bottom:-20%;right:-10%;width:600px;height:600px;background:radial-gradient(circle,rgba(167,139,250,0.06) 0%,transparent 70%);border-radius:50%;pointer-events:none;}
.header{text-align:center;padding-top:16px;padding-bottom:12px;z-index:1;}
.logo-row{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:6px;}
.logo-icon{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,#38bdf8,#818cf8);display:flex;align-items:center;justify-content:center;font-size:18px;box-shadow:0 0 20px rgba(56,189,248,0.3);}
.logo-name{font-size:22px;font-family:'Fraunces',serif;font-weight:500;color:#f1f5f9;letter-spacing:-0.3px;}
.anon-badge{font-size:11px;background:rgba(56,189,248,0.1);color:#38bdf8;border:1px solid rgba(56,189,248,0.2);border-radius:20px;padding:2px 10px;font-weight:500;letter-spacing:0.5px;}
.tagline{color:#64748b;font-size:13px;font-weight:300;}
.chat-window{width:100%;max-width:900px;height:calc(100vh - 140px);background:rgba(15,23,42,0.95);border:1px solid rgba(255,255,255,0.06);border-radius:20px;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 25px 60px rgba(0,0,0,0.5);z-index:1;}
.messages{flex:1;overflow-y:auto;padding:24px 20px 16px;scrollbar-width:thin;scrollbar-color:#1e293b transparent;display:flex;flex-direction:column;justify-content:flex-end;}
.messages-inner{display:flex;flex-direction:column;gap:14px;}
.welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:20px;}
.welcome-quote{color:#94a3b8;font-size:15px;font-family:'Fraunces',serif;font-style:italic;font-weight:300;margin-bottom:6px;}
.welcome-sub{color:#475569;font-size:12px;}
.suggestions{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;max-width:420px;}
.suggestion-btn{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);color:#94a3b8;border-radius:20px;padding:8px 16px;font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.2s;}
.suggestion-btn:hover{background:rgba(56,189,248,0.08);border-color:rgba(56,189,248,0.3);color:#e2e8f0;}
.msg-row{display:flex;animation:fadeUp 0.3s ease;}
.msg-row.user{justify-content:flex-end;}
.msg-row.assistant{justify-content:flex-start;}
.avatar{width:28px;height:28px;border-radius:8px;flex-shrink:0;background:linear-gradient(135deg,#38bdf8,#818cf8);display:flex;align-items:center;justify-content:center;font-size:13px;margin-right:10px;margin-top:2px;}
.bubble{max-width:75%;padding:11px 15px;font-size:14px;line-height:1.65;font-weight:300;}
.bubble.user{background:linear-gradient(135deg,#38bdf8,#818cf8);color:#fff;border-radius:16px 4px 16px 16px;}
.bubble.assistant{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.07);color:#cbd5e1;border-radius:4px 16px 16px 16px;}
.typing-dots{display:flex;gap:5px;padding:12px 16px;background:rgba(255,255,255,0.05);border-radius:4px 16px 16px 16px;border:1px solid rgba(255,255,255,0.07);}
.dot{width:6px;height:6px;border-radius:50%;background:#38bdf8;opacity:0.7;}
.input-area{padding:14px 16px;border-top:1px solid rgba(255,255,255,0.05);background:rgba(0,0,0,0.2);display:flex;gap:10px;align-items:flex-end;max-width:750px;margin:0 auto;width:100%;border-radius:16px;margin-bottom:8px;}
#inp{flex:1;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);border-radius:12px;color:#e2e8f0;padding:11px 14px;font-size:14px;font-family:'DM Sans',sans-serif;resize:none;outline:none;line-height:1.5;font-weight:300;max-height:120px;overflow-y:auto;transition:border-color 0.2s;}
#inp:focus{border-color:rgba(56,189,248,0.4);}
#inp::placeholder{color:#475569;}
#sendbtn{width:40px;height:40px;border-radius:12px;border:none;background:rgba(255,255,255,0.06);color:#475569;cursor:not-allowed;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;transition:all 0.2s;}
#sendbtn.active{background:linear-gradient(135deg,#38bdf8,#818cf8);color:#fff;cursor:pointer;box-shadow:0 0 16px rgba(56,189,248,0.3);}
.footer{color:#334155;font-size:11px;margin-top:8px;margin-bottom:12px;text-align:center;z-index:1;}
#clearbtn{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);color:#94a3b8;font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;padding:6px 14px;border-radius:20px;transition:all 0.2s;vertical-align:middle;}
#clearbtn:hover{background:rgba(248,113,113,0.12);border-color:rgba(248,113,113,0.35);color:#f87171;}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-6px)}}
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:#1e293b;border-radius:2px;}
</style>
</head>
<body>
<div class="blob1"></div>
<div class="blob2"></div>

<div class="header">
  <div class="logo-row">
    <div class="logo-icon">🌿</div>
    <span class="logo-name">Mind-Ora</span>
    <span class="anon-badge">ANONYMOUS</span>
  </div>
  <p class="tagline">A safe space to talk — no judgment, no names</p>
</div>

<div class="chat-window">
  <div class="messages" id="msgs">
    <div class="messages-inner" id="msgsInner">
      <div class="welcome" id="welcome">
        <div style="text-align:center;">
          <p class="welcome-quote">"What's on your mind today?"</p>
          <p class="welcome-sub">Pick a topic or type your own</p>
        </div>
        <div class="suggestions">
          <button class="suggestion-btn" onclick="sendMsg(this.textContent)">I'm overwhelmed with exams 😓</button>
          <button class="suggestion-btn" onclick="sendMsg(this.textContent)">I feel lonely on campus</button>
          <button class="suggestion-btn" onclick="sendMsg(this.textContent)">I don't know what career to pick</button>
          <button class="suggestion-btn" onclick="sendMsg(this.textContent)">I'm struggling to focus lately</button>
        </div>
      </div>
    </div>
  </div>
  <div style="padding:14px 16px;border-top:1px solid rgba(255,255,255,0.05);background:rgba(0,0,0,0.2);">
    <div class="input-area">
      <textarea id="inp" placeholder="Share what's on your mind..." rows="1" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg();}"></textarea>
      <button id="sendbtn" onclick="sendMsg()">↑</button>
    </div>
  </div>
</div>

<p class="footer">Mind-Ora is not a crisis service · If you're in danger, call emergency services · <button id="clearbtn" onclick="clearMemory()">clear memory</button></p>

<script>
const GROQ_API_KEY = "YOUR_GROQ_API_KEY_HERE";

const SYSTEM_PROMPT = `You are Mindora, a warm and emotionally intelligent companion for university students. You are not a therapist and never claim to be one, but your behavior is informed by evidence-based therapeutic communication principles. Your purpose is to make students feel heard, understood, and a little less alone.
Your core attitude is built on three things: genuine empathy, being real and not robotic, and unconditional positive regard. You never judge. You never lecture. You treat every student with quiet respect.
How you respond:
First, always acknowledge the feeling behind what someone said before anything else. Reflect the emotion, not just the words. If someone says "I have so much work I cant even sleep" you respond to the exhaustion and pressure they are carrying, not the work itself. Make them feel deeply heard in your first sentence.
Second, ask one open ended question that invites them to share more. Use "how" or "what" not "did" or "are". Never ask multiple questions in one message. Let them lead the conversation.
Third, the student should be doing most of the talking. Your messages are short. Two to four sentences max. You are a mirror that helps them see their own thoughts more clearly, not a lecturer.
Fourth, when appropriate, gently affirm their strengths or efforts. Things like "it took something to even put that into words" or "the fact that you are noticing this matters". Never generic compliments. Specific to what they shared.
Fifth, pick up on social cues and informal language. If someone says "damn" or "ugh" or "bro" they are expressing a feeling. Respond to the emotion under the word, not the word itself.
What you never do:
Never give a list of tips. Never say "here are some things you can try". Never use bullet points. Never say "I am here for you, can you tell me more". Never sound like a customer service bot. Never use fake enthusiasm like "Absolutely" or "Of course". Never diagnose. Never tell them what they are feeling, only reflect what they themselves expressed. Never push solutions when they just want to be heard.
Crisis response:
If a student mentions self harm, suicide, abuse, or any immediate danger, gently and warmly tell them this is bigger than what you can hold and it really matters that they reach out to someone who can be there for them properly. Suggest a trusted person in their life or a professional resource. Stay calm and warm. Do not panic or overdramatize. Do not list multiple resources. Just one gentle redirect with care.
Tone:
Sound like a real human who genuinely cares, not a therapist analyzing a case. Talk the way a close caring friend would talk. If someone shares something painful, respond to the pain simply and directly without intellectualizing it. Match the length of your response to the situation. If someone sends a short message, keep it short. If someone shares something deep and detailed, you can respond with a bit more. But never ramble. Every sentence should earn its place. And never use clinical or analytical language like 'the depth of your feelings' or 'the complexity of this'. Talk like a real caring human, not a therapist writing case notes.`;

const MEMORY_KEY = 'mindora_memory';
let messages = [];
const inp = document.getElementById('inp');
const sendbtn = document.getElementById('sendbtn');
const msgsInner = document.getElementById('msgsInner');

inp.addEventListener('input', () => {
  sendbtn.classList.toggle('active', inp.value.trim().length > 0);
});

function saveMemory() {
  localStorage.setItem(MEMORY_KEY, JSON.stringify(messages));
}

function clearMemory() {
  localStorage.removeItem(MEMORY_KEY);
  messages = [];
  msgsInner.innerHTML = '';
  msgsInner.innerHTML = `<div class="welcome" id="welcome">
    <div style="text-align:center;">
      <p class="welcome-quote">"What's on your mind today?"</p>
      <p class="welcome-sub">Pick a topic or type your own</p>
    </div>
    <div class="suggestions">
      <button class="suggestion-btn" onclick="sendMsg(this.textContent)">I'm overwhelmed with exams 😓</button>
      <button class="suggestion-btn" onclick="sendMsg(this.textContent)">I feel lonely on campus</button>
      <button class="suggestion-btn" onclick="sendMsg(this.textContent)">I don't know what career to pick</button>
      <button class="suggestion-btn" onclick="sendMsg(this.textContent)">I'm struggling to focus lately</button>
    </div>
  </div>`;
}

(function loadMemory() {
  const saved = localStorage.getItem(MEMORY_KEY);
  if (!saved) return;
  try {
    const history = JSON.parse(saved);
    if (!history.length) return;
    messages = history;
    document.getElementById('welcome')?.remove();
    history.forEach(m => {
      const row = document.createElement('div');
      row.className = 'msg-row ' + m.role;
      if (m.role === 'assistant') {
        row.innerHTML = `<div class="avatar">🌿</div><div class="bubble assistant">${m.content}</div>`;
      } else {
        row.innerHTML = `<div class="bubble user">${m.content}</div>`;
      }
      msgsInner.appendChild(row);
    });
    document.getElementById('msgs').scrollTop = document.getElementById('msgs').scrollHeight;
  } catch(e) {
    localStorage.removeItem(MEMORY_KEY);
  }
})();

function addMsg(role, text) {
  document.getElementById('welcome')?.remove();
  const row = document.createElement('div');
  row.className = 'msg-row ' + role;
  if (role === 'assistant') {
    row.innerHTML = `<div class="avatar">🌿</div><div class="bubble assistant">${text}</div>`;
  } else {
    row.innerHTML = `<div class="bubble user">${text}</div>`;
  }
  msgsInner.appendChild(row);
  document.getElementById('msgs').scrollTop = document.getElementById('msgs').scrollHeight;
}

function showTyping() {
  document.getElementById('welcome')?.remove();
  const row = document.createElement('div');
  row.className = 'msg-row assistant';
  row.id = 'typing';
  row.innerHTML = `<div class="avatar">🌿</div><div class="typing-dots"><div class="dot" style="animation:bounce 1.2s ease-in-out 0s infinite"></div><div class="dot" style="animation:bounce 1.2s ease-in-out 0.2s infinite"></div><div class="dot" style="animation:bounce 1.2s ease-in-out 0.4s infinite"></div></div>`;
  msgsInner.appendChild(row);
  document.getElementById('msgs').scrollTop = document.getElementById('msgs').scrollHeight;
}

function removeTyping() {
  document.getElementById('typing')?.remove();
}

async function sendMsg(text) {
  const userText = text || inp.value.trim();
  if (!userText) return;
  inp.value = '';
  sendbtn.classList.remove('active');
  addMsg('user', userText);
  messages.push({ role: 'user', content: userText });
  showTyping();

  try {
    const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${GROQ_API_KEY}`
      },
      body: JSON.stringify({
        model: 'llama-3.3-70b-versatile',
        messages: [
          { role: 'system', content: SYSTEM_PROMPT },
          ...messages
        ]
      })
    });
    const data = await res.json();
    const reply = data.choices?.[0]?.message?.content || 'Something went wrong, try sending that again.';
    removeTyping();
    addMsg('assistant', reply);
    messages.push({ role: 'assistant', content: reply });
    saveMemory();
  } catch (err) {
    removeTyping();
    addMsg('assistant', 'Something went wrong, try sending that again.');
  }
}
</script>
</body>
</html>
